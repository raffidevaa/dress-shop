name: CI — Code Quality, Tests, and SonarCloud Analysis

on:
  push:
    paths:
    - 'client/**'
    - 'server/**'
    - '.github/workflows/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1

jobs:

  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      client_changed: ${{ steps.client.outputs.any_changed }}
      server_changed: ${{ steps.server.outputs.any_changed }}
      workflow_changed: ${{ steps.workflow.outputs.any_changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: client
        uses: tj-actions/changed-files@v47
        with:
          files: |
            client/**

      - id: server
        uses: tj-actions/changed-files@v47
        with:
          files: |
            server/**

      - id: workflow
        uses: tj-actions/changed-files@v47
        with:
          files: |
            .github/workflows/**

  # Install Dependencies and Code Quality Check (Linting)
  lint-server:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.server_changed == 'true' || 
      needs.detect-changes.outputs.workflow_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Cache server node_modules
        uses: actions/cache@v4
        id: cache-server-modules
        with:
          path: server/node_modules
          key: ${{ runner.os }}-server-modules-${{ hashFiles('server/package-lock.json') }}

      - name: Install Server Dependencies
        if: steps.cache-server-modules.outputs.cache-hit != 'true'
        working-directory: ./server
        run: npm ci --legacy-peer-deps

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: server/.eslintcache
          key: ${{ runner.os }}-eslint-server-${{ hashFiles('server/**/*.ts', 'server/.eslintrc*') }}
          restore-keys: ${{ runner.os }}-eslint-server-

      - name: Lint Server
        working-directory: ./server
        run: npx eslint . --cache --cache-location .eslintcache

  lint-client:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.client_changed == 'true' || 
      needs.detect-changes.outputs.workflow_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js for Client
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Cache client node_modules
        uses: actions/cache@v4
        id: cache-client-modules
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-modules-${{ hashFiles('client/package-lock.json') }}

      - name: Install Client Dependencies
        if: steps.cache-client-modules.outputs.cache-hit != 'true'
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: client/.eslintcache
          key: ${{ runner.os }}-eslint-client-${{ hashFiles('client/**/*.ts', 'client/**/*.tsx', 'client/.eslintrc*') }}
          restore-keys: ${{ runner.os }}-eslint-client-

      - name: Lint Client
        working-directory: ./client
        run: npx next lint --cache --cache-location .eslintcache

  # Jest Unit Tests
  jest-test:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.client_changed == 'true' ||
      needs.detect-changes.outputs.server_changed == 'true' ||
      needs.detect-changes.outputs.workflow_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js for Client Test
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Cache client node_modules
        uses: actions/cache@v4
        id: cache-client-modules
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-modules-${{ hashFiles('client/package-lock.json') }}

      - name: Install client dependencies
        if: steps.cache-client-modules.outputs.cache-hit != 'true'
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Cache Jest
        uses: actions/cache@v4
        with:
          path: client/.jest-cache
          key: ${{ runner.os }}-jest-${{ hashFiles('client/package-lock.json') }}
          restore-keys: ${{ runner.os }}-jest-

      - name: Run Jest (client)
        working-directory: ./client
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run test -- --coverage --coverageReporters=lcov --watchAll=false --forceExit --maxWorkers=2 --cacheDirectory=.jest-cache

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: client/coverage/lcov.info

  # SonarCloud Analysis
  sonarcloud:
    needs: [jest-test]
    if: needs.jest-test.result == 'success'

    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SonarCloud scanner
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: client/coverage

      - name: Scan with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION_KEY }}
            -Dsonar.sources=client
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=client/coverage/lcov.info
            -Dsonar.coverage.exclusions=**/pages/**,**/constants/**,**/types/**,**/cypress/**,**/*.config.*,**/jest.setup.*,**/test/**
            -Dsonar.qualitygate.wait=false
  
  # Build and Push Docker Images to GCR
  build-and-push:
    needs: [lint-server, lint-client, sonarcloud, jest-test]
    if: |
      always() &&
      (needs.lint-server.result == 'success' || needs.lint-server.result == 'skipped') &&
      (needs.lint-client.result == 'success' || needs.lint-client.result == 'skipped') &&
      (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped') &&
      (needs.jest-test.result == 'success' || needs.jest-test.result == 'skipped')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Server Docker Image to GCR
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dress-shop/server:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dress-shop/server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Fetch client build secrets
        id: secrets
        run: |
          {
            echo "api_url=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_API_URL)"
            echo "google_client_id=$(gcloud secrets versions access latest --secret=GOOGLE_WEB_CLIENT_ID)"
            echo "stripe_publishable_key=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and Push Client Docker Image to GCR
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.secrets.outputs.api_url }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ steps.secrets.outputs.google_client_id }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ steps.secrets.outputs.stripe_publishable_key }}
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dress-shop/client:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dress-shop/client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client