name: CI — Code Quality, Tests, and SonarCloud Analysis

on:
  push:
    paths:
    - 'client/**'
    - 'server/**'
    - '.github/workflows/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  ARTIFACT_REPO: dress-shop-repo

jobs:

  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      client_changed: ${{ steps.client.outputs.any_changed }}
      server_changed: ${{ steps.server.outputs.any_changed }}
      workflow_changed: ${{ steps.workflow.outputs.any_changed }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: client
        uses: tj-actions/changed-files@v47
        with:
          files: |
            client/**

      - id: server
        uses: tj-actions/changed-files@v47
        with:
          files: |
            server/**

      - id: workflow
        uses: tj-actions/changed-files@v47
        with:
          files: |
            .github/workflows/**

  # Install Dependencies and Code Quality Check (Linting)
  lint-server:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.server_changed == 'true' || 
      needs.detect-changes.outputs.workflow_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'
          
      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install

      - name: Lint Server
        working-directory: ./server
        run: npm run lint

  lint-client:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.client_changed == 'true' || 
      needs.detect-changes.outputs.workflow_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js for Client
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Client Dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Lint Client
        working-directory: ./client
        run: npm run lint

  # Jest Unit Tests
  jest-test:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.client_changed == 'true' ||
      needs.detect-changes.outputs.server_changed == 'true' ||
      needs.detect-changes.outputs.workflow_changed == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js for Client Test
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install client dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Run Jest (client)
        working-directory: ./client
        run: npm run test -- --coverage --coverageReporters=lcov --watchAll=false --forceExit

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        with:
          name: coverage-reports
          path: client/coverage/lcov.info

  # SonarCloud Analysis
  sonarcloud:
    needs: [lint-server, lint-client, jest-test]
    if: |
      always() &&
      (needs.lint-server.result == 'success' || needs.lint-server.result == 'skipped') &&
      (needs.lint-client.result == 'success' || needs.lint-client.result == 'skipped') &&
      (needs.jest-test.result == 'success' || needs.jest-test.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage reports
        uses: actions/download-artifact@v7
        with:
          name: coverage-reports

      - name: Scan with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION_KEY }}
            -Dsonar.sources=client,server/src
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=client/coverage/lcov.info
            -Dsonar.qualitygate.wait=false
  
  # Build and Push Docker Image to GCR
  build-and-push:
    needs: sonarcloud
    if: |
      always() &&
      (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and Push Server Docker Image to GCR
        run: |
          IMAGE_SERVER=asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/dress-shop/server

          docker build -t $IMAGE_SERVER:${{ github.sha }} -t $IMAGE_SERVER:latest ./server

          docker push $IMAGE_SERVER:${{ github.sha }}
          docker push $IMAGE_SERVER:latest
      
      - name: Build and Push Client Docker Image to GCR
        run: |
          # Fetch secrets
          API_URL=$(gcloud secrets versions access latest --secret="NEXT_PUBLIC_API_URL")
          GOOGLE_CLIENT_ID=$(gcloud secrets versions access latest --secret="GOOGLE_WEB_CLIENT_ID")

          IMAGE_CLIENT=asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/dress-shop/client

          docker build \
            --build-arg NEXT_PUBLIC_API_URL=$API_URL \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID \
            -t $IMAGE_CLIENT:${{ github.sha }} -t $IMAGE_CLIENT:latest ./client

          docker push $IMAGE_CLIENT:${{ github.sha }}
          docker push $IMAGE_CLIENT:latest