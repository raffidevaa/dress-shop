name: CD — Direct Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["CI — Code Quality, Tests, and SonarCloud Analysis"]
    types:
      - completed

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME: dress-shop
  IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dress-shop

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      server_url: ${{ steps.get_urls.outputs.server_url }}
      client_url: ${{ steps.get_urls.outputs.client_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Debug Project ID
        run: echo "Current Project ID is ${{ env.PROJECT_ID }}"

      - name: Verify server image exists in GCR
        run: |
          for i in {1..3}; do
            gcloud artifacts docker images describe ${{ env.IMAGE }}/server:${{ github.sha }} --format="get(name)" && break
            echo "Waiting for image to be indexed..."
            sleep 10
          done

      - name: Deploy server to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-server \
            --image ${{ env.IMAGE }}/server:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars NODE_ENV=production \
            --set-secrets=DATABASE_URI=DATABASE_URI:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest \
            --quiet

      - name: Verify client image exists in GCR
        run: |
          for i in {1..3}; do
            gcloud artifacts docker images describe ${{ env.IMAGE }}/client:${{ github.sha }} --format="get(name)" && break
            echo "Waiting for image to be indexed..."
            sleep 10
          done

      - name: Deploy client to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-client \
            --image ${{ env.IMAGE }}/client:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars NODE_ENV=production \
            --quiet

      - name: Deploy Discord Bridge Cloud Function
        run: |
          gcloud functions deploy discord-bridge \
            --gen2 \
            --runtime=nodejs22 \
            --region=${{ env.REGION }} \
            --source=server/functions/discord-bridge \
            --entry-point=discordBridge \
            --trigger-http \
            --allow-unauthenticated \
            --set-secrets="DISCORD_WEBHOOK_ALERTS=DISCORD_WEBHOOK_ALERTS:latest,DISCORD_WEBHOOK_ERRORS=DISCORD_WEBHOOK_ERRORS:latest,DISCORD_WEBHOOK_UPTIME=DISCORD_WEBHOOK_UPTIME:latest"

      - name: Capture deployed service URLs
        id: get_urls
        run: |
          SERVER_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }}-server \
            --region ${{ env.REGION }} \
            --format "value(status.url)")

          CLIENT_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }}-client \
            --region ${{ env.REGION }} \
            --format "value(status.url)")

          echo "server_url=$SERVER_URL" >> $GITHUB_OUTPUT
          echo "client_url=$CLIENT_URL" >> $GITHUB_OUTPUT

          echo "Server: $SERVER_URL"
          echo "Client: $CLIENT_URL"

  smoke-test:
    name: Smoke Tests
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '1.7.1'

      - name: Run k6 Smoke Tests
        run: k6 run ./client/test/k6/smoke.js
        env:
          SERVER_BASE_URL: ${{ needs.deploy.outputs.server_url }}
          CLIENT_BASE_URL: ${{ needs.deploy.outputs.client_url }}

  e2e-test:
    name: E2E Tests
    needs: [deploy, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install client dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Run Cypress E2E Tests
        working-directory: ./client
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: ${{ needs.deploy.outputs.client_url }}