name: CD — Deploy Staging & Test

on:
  workflow_run:
    workflows: ["CI — Code Quality, Tests, and SonarCloud Analysis"]
    types:
      - completed

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME: dress-shop
  IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dress-shop

jobs:
  deploy:
    name: Deploy Staging
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write

    outputs:
      server_url: ${{ steps.get_urls.outputs.server_url }}
      client_url: ${{ steps.get_urls.outputs.client_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Debug Project ID
        run: echo "Current Project ID is ${{ env.PROJECT_ID }}"

      - name: Verify staging server image exists in GCR
        run: |
          for i in {1..3}; do
            gcloud artifacts docker images describe ${{ env.IMAGE }}/server:${{ github.sha }}-staging --format="get(name)" && break
            echo "Waiting for image to be indexed..."
            sleep 10
          done

      - name: Verify staging client image exists in GCR
        run: |
          for i in {1..3}; do
            gcloud artifacts docker images describe ${{ env.IMAGE }}/client:${{ github.sha }}-staging --format="get(name)" && break
            echo "Waiting for image to be indexed..."
            sleep 10
          done

      - name: Deploy staging server & client to Cloud Run (parallel)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-server-staging \
            --image ${{ env.IMAGE }}/server:${{ github.sha }}-staging \
            --region ${{ env.REGION }} --platform managed --allow-unauthenticated \
            --port 8080 --memory 1Gi --cpu 1 --min-instances 0 --max-instances 3 \
            --set-env-vars NODE_ENV=staging \
            --set-secrets=DATABASE_URI=DATABASE_URI_STAGING:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,STRIPE_SECRET_API_KEY=STRIPE_SECRET_API_KEY:latest \
            --quiet &
          SERVER_PID=$!

          gcloud run deploy ${{ env.SERVICE_NAME }}-client-staging \
            --image ${{ env.IMAGE }}/client:${{ github.sha }}-staging \
            --region ${{ env.REGION }} --platform managed --allow-unauthenticated \
            --port 8080 --memory 512Mi --cpu 1 --min-instances 0 --max-instances 3 \
            --set-env-vars NODE_ENV=staging \
            --quiet &
          CLIENT_PID=$!

          SERVER_RC=0; CLIENT_RC=0
          wait $SERVER_PID || SERVER_RC=$?
          wait $CLIENT_PID || CLIENT_RC=$?
          if [ $SERVER_RC -ne 0 ] || [ $CLIENT_RC -ne 0 ]; then
            echo "Deploy failed (server=$SERVER_RC client=$CLIENT_RC)"; exit 1
          fi

      - name: Capture deployed staging service URLs
        id: get_urls
        run: |
          SERVER_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }}-server-staging \
            --region ${{ env.REGION }} \
            --format "value(status.url)")

          CLIENT_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }}-client-staging \
            --region ${{ env.REGION }} \
            --format "value(status.url)")

          echo "server_url=$SERVER_URL" >> $GITHUB_OUTPUT
          echo "client_url=$CLIENT_URL" >> $GITHUB_OUTPUT

          echo "Server: $SERVER_URL"
          echo "Client: $CLIENT_URL"

  smoke-test:
    name: Smoke Tests (Staging)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '1.7.1'

      - name: Run k6 Smoke Tests
        run: k6 run ./client/test/k6/smoke.js
        env:
          SERVER_BASE_URL: ${{ needs.deploy.outputs.server_url }}
          CLIENT_BASE_URL: ${{ needs.deploy.outputs.client_url }}

  e2e-test:
    name: E2E Tests (Staging)
    needs: [deploy, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Cache client node_modules
        uses: actions/cache@v4
        id: cache-client-modules
        with:
          path: client/node_modules
          key: ${{ runner.os }}-client-modules-${{ hashFiles('client/package-lock.json') }}

      - name: Install client dependencies
        if: steps.cache-client-modules.outputs.cache-hit != 'true'
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('client/package-lock.json') }}

      - name: Ensure Cypress binary installed
        working-directory: ./client
        run: npx cypress install

      - name: Run Cypress E2E Tests
        working-directory: ./client
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: ${{ needs.deploy.outputs.client_url }}