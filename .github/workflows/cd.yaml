name: CD — Direct Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["CI — Code Quality, Tests, and SonarCloud Analysis"]
    types:
      - completed

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME: dress-shop
  IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dress-shop

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify server image exists in GCR
        run: |
          gcloud container images describe ${{ env.IMAGE }}/server:${{ github.sha }} \
            --format="get(image_summary.digest)"

      - name: Deploy server to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-server \
            --image ${{ env.IMAGE }}/server:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars NODE_ENV=production \
            --set-secrets=DATABASE_URI=DATABASE_URI:latest \
            --quiet

      - name: Verify client image exists in GCR
        run: |
          gcloud container images describe ${{ env.IMAGE }}/client:${{ github.sha }} \
            --format="get(image_summary.digest)"

      - name: Deploy client to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-client \
            --image ${{ env.IMAGE }}/client:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars NODE_ENV=production \
            --quiet

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }}-server \
            --region ${{ env.REGION }} \
            --format "value(status.url)"

          gcloud run services describe ${{ env.SERVICE_NAME }}-client \
            --region ${{ env.REGION }} \
            --format "value(status.url)"

      - name: Deploy Discord Bridge Cloud Function
        run: |
          gcloud functions deploy discord-bridge \
            --gen2 \
            --runtime=nodejs22 \
            --region=${{ env.REGION }} \
            --source=server/functions/discord-bridge \
            --entry-point=discordBridge \
            --trigger-http \
            --allow-unauthenticated \
            --set-secrets="DISCORD_WEBHOOK_ALERTS=DISCORD_WEBHOOK_ALERTS:latest,DISCORD_WEBHOOK_ERRORS=DISCORD_WEBHOOK_ERRORS:latest,DISCORD_WEBHOOK_UPTIME=DISCORD_WEBHOOK_UPTIME:latest"
