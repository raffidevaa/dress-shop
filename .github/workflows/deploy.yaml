name: CI — Code Quality, Tests, and SonarCloud Analysis
on:
  push:
    branches:
      - main
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast2
  ARTIFACT_REPO: dress-shop-repo
jobs:
  # Step 1: Install Dependencies and Code Quality Check (Linting)
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install

      - name: Lint Server
        working-directory: ./server
        run: npm run lint

      - name: Install Client Dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Lint Client
        working-directory: ./client
        run: npm run lint

  # Step 2: Jest Unit Tests
  jest-test:
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install client dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps
      - name: Run Jest (client)
        working-directory: ./client
        run: npm run test -- --coverage --coverageReporters=lcov --watchAll=false --forceExit
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            server/coverage/lcov.info
            client/coverage/lcov.info

  # Step 3: SonarCloud Analysis
  sonarcloud:
    needs: jest-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
      - name: Scan with SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION_KEY }}
            -Dsonar.sources=client,server/src
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=server/coverage/lcov.info,client/coverage/lcov.info
            -Dsonar.qualitygate.wait=false
  
  # Step 4: Build and Push Docker Image to GCR
  build-and-push:
    needs: sonarcloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_CREDENTIALS }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and Push Server Docker Image to GCR
        run: |
          IMAGE_SERVER=gcr.io/${{ env.PROJECT_ID }}/dress-shop-server

          docker build -t $IMAGE_SERVER:${{ github.sha }} -t $IMAGE_SERVER:latest ./server

          docker push $IMAGE_SERVER:${{ github.sha }}
          docker push $IMAGE_SERVER:latest
      
      - name: Build and Push Client Docker Image to GCR
        run: |
          IMAGE_CLIENT=gcr.io/${{ env.PROJECT_ID }}/dress-shop-client

          docker build -t $IMAGE_CLIENT:${{ github.sha }} -t $IMAGE_CLIENT:latest ./client

          docker push $IMAGE_CLIENT:${{ github.sha }}
          docker push $IMAGE_CLIENT:latest