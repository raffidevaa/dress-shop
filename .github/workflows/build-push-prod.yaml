name: Build & Push Production Images

on:
  workflow_run:
    workflows: ["CI — Code Quality, Tests, and SonarCloud Analysis"]
    types:
      - completed

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1

jobs:
  build-prod:
    name: Build & Push Production Images
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Production Server Docker Image to GCR
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dress-shop/server:${{ github.event.workflow_run.head_sha }}-production
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server-prod

      - name: Fetch production client build secrets
        id: secrets
        run: |
          {
            echo "api_url=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_API_URL)"
            echo "google_client_id=$(gcloud secrets versions access latest --secret=GOOGLE_WEB_CLIENT_ID)"
            echo "stripe_publishable_key=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and Push Production Client Docker Image to GCR
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.secrets.outputs.api_url }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ steps.secrets.outputs.google_client_id }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ steps.secrets.outputs.stripe_publishable_key }}
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/dress-shop/client:${{ github.event.workflow_run.head_sha }}-production
          cache-from: type=gha,scope=client-prod
          cache-to: type=gha,mode=max,scope=client-prod
