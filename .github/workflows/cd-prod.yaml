name: CD — Deploy Production

on:
  workflow_run:
    workflows: ["CD — Deploy Staging & Test"]
    types:
      - completed

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME: dress-shop
  IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dress-shop

jobs:
  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write

    env:
      SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify production server image exists in GCR
        run: |
          for i in {1..3}; do
            gcloud artifacts docker images describe "${IMAGE}/server:${SHA}-production" --format="get(name)" && break
            echo "Waiting for image to be indexed..."
            sleep 10
          done

      - name: Verify production client image exists in GCR
        run: |
          for i in {1..3}; do
            gcloud artifacts docker images describe "${IMAGE}/client:${SHA}-production" --format="get(name)" && break
            echo "Waiting for image to be indexed..."
            sleep 10
          done

      - name: Deploy production server & client to Cloud Run (parallel)
        run: |
          gcloud run deploy "${SERVICE_NAME}-server-production" \
            --image "${IMAGE}/server:${SHA}-production" \
            --region "${REGION}" --platform managed --allow-unauthenticated \
            --port 8080 --memory 1Gi --cpu 1 --min-instances 0 --max-instances 10 \
            --set-env-vars NODE_ENV=production \
            --set-secrets=DATABASE_URI=DATABASE_URI:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,STRIPE_SECRET_API_KEY=STRIPE_SECRET_API_KEY:latest \
            --quiet &
          SERVER_PID=$!

          gcloud run deploy "${SERVICE_NAME}-client-production" \
            --image "${IMAGE}/client:${SHA}-production" \
            --region "${REGION}" --platform managed --allow-unauthenticated \
            --port 8080 --memory 512Mi --cpu 1 --min-instances 0 --max-instances 10 \
            --set-env-vars NODE_ENV=production \
            --quiet &
          CLIENT_PID=$!

          SERVER_RC=0; CLIENT_RC=0
          wait $SERVER_PID || SERVER_RC=$?
          wait $CLIENT_PID || CLIENT_RC=$?
          if [ $SERVER_RC -ne 0 ] || [ $CLIENT_RC -ne 0 ]; then
            echo "Production deploy failed (server=$SERVER_RC client=$CLIENT_RC)"; exit 1
          fi

      - name: Capture deployed production service URLs
        run: |
          SERVER_URL=$(gcloud run services describe "${SERVICE_NAME}-server-production" \
            --region "${REGION}" --format "value(status.url)")
          CLIENT_URL=$(gcloud run services describe "${SERVICE_NAME}-client-production" \
            --region "${REGION}" --format "value(status.url)")
          echo "Server (production): $SERVER_URL"
          echo "Client (production): $CLIENT_URL"
